<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; font-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MD Viewer</title>
    <link rel="icon" type="image/png" href="./favicon-32.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-group">
        <button id="openBtn" type="button">Open Markdown</button>
        <button id="openFolderBtn" type="button">Open Folder</button>
        <button id="reloadBtn" type="button">Reload</button>
        <button id="saveBtn" type="button">Save</button>
        <button id="saveAsBtn" type="button">Save As</button>
      </div>
      <div class="toolbar-group">
        <button id="exportPdfBtn" type="button">Export PDF</button>
        <button id="exportDocxBtn" type="button">Export DOCX</button>
        <button id="exportHtmlBtn" type="button">Export HTML Folder</button>
      </div>
    </header>

    <section class="status-row">
      <div id="statusText">No markdown file loaded.</div>
      <div id="dirtyIndicator" class="dirty-indicator hidden">Unsaved changes</div>
    </section>

    <section id="warnings" class="warnings hidden" aria-live="polite"></section>

    <section class="workspace" id="workspace">
      <aside id="sidebar" class="sidebar" aria-label="Markdown Navigator">
        <section class="sidebar-section">
          <div class="sidebar-section-header">
            <h2>Pinned</h2>
            <button id="pinRootBtn" class="secondary" type="button">Pin Root</button>
          </div>
          <ul id="pinnedList" class="pinned-list"></ul>
          <p id="pinnedEmpty" class="muted">No pinned folders.</p>
        </section>

        <section class="sidebar-section">
          <div class="sidebar-section-header">
            <h2>Root</h2>
            <div class="sidebar-actions">
              <button id="refreshTreeBtn" class="secondary" type="button">Refresh</button>
            </div>
          </div>
          <div id="rootPath" class="root-path">No root selected.</div>
        </section>

        <section class="sidebar-section tree-section">
          <div class="sidebar-section-header">
            <h2>Files</h2>
          </div>
          <div id="treeContainer" class="tree-container">
            <p class="muted">Loading folder tree...</p>
          </div>
        </section>
      </aside>

      <div
        id="sidebarResizer"
        class="sidebar-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize sidebar"
      ></div>

      <section class="viewer-pane">
        <div id="documentTabs" class="document-tabs" role="tablist" aria-label="Open Markdown Documents">
          <div class="document-tabs-empty">No documents open.</div>
        </div>

        <div class="editor-tabs" role="tablist" aria-label="Document View">
          <button id="tabRender" class="tab-btn active" type="button" role="tab" aria-selected="true">Render</button>
          <button id="tabEdit" class="tab-btn" type="button" role="tab" aria-selected="false">Edit</button>
          <span id="previewStatus" class="preview-status"></span>
        </div>

        <div id="editorHost" class="editor-host hidden" aria-label="Markdown Editor"></div>

        <div id="renderHost" class="preview" tabindex="0" aria-label="Rendered Output">
          <div class="empty-state">
            Drop a <code>.md</code> file here, or use <strong>Open Markdown</strong>.
          </div>
        </div>
      </section>
    </section>

    <div id="modalHost" class="modal-host hidden" aria-live="assertive"></div>

    <script src="./app.js"></script>
  </body>
</html>
