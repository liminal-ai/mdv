<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430">
  <rect width="960" height="430" fill="#f8fafc"/>
  <text x="480" y="50" text-anchor="middle" font-size="30" fill="#111827">Quality Matrix</text>

  <rect x="80" y="90" width="800" height="280" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <line x1="80" y1="150" x2="880" y2="150" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="80" y1="220" x2="880" y2="220" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="80" y1="290" x2="880" y2="290" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="300" y1="90" x2="300" y2="370" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="520" y1="90" x2="520" y2="370" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="700" y1="90" x2="700" y2="370" stroke="#cbd5e1" stroke-width="2"/>

  <text x="190" y="128" text-anchor="middle" font-size="18" fill="#0f172a">Category</text>
  <text x="410" y="128" text-anchor="middle" font-size="18" fill="#0f172a">Signal</text>
  <text x="610" y="128" text-anchor="middle" font-size="18" fill="#0f172a">Threshold</text>
  <text x="790" y="128" text-anchor="middle" font-size="18" fill="#0f172a">Owner</text>

  <text x="190" y="192" text-anchor="middle" font-size="16" fill="#1e293b">Pagination</text>
  <text x="410" y="192" text-anchor="middle" font-size="16" fill="#1e293b">Orphan headings</text>
  <text x="610" y="192" text-anchor="middle" font-size="16" fill="#1e293b">&lt; 3 per doc</text>
  <text x="790" y="192" text-anchor="middle" font-size="16" fill="#1e293b">Rendering</text>

  <text x="190" y="262" text-anchor="middle" font-size="16" fill="#1e293b">Images</text>
  <text x="410" y="262" text-anchor="middle" font-size="16" fill="#1e293b">Broken embeds</text>
  <text x="610" y="262" text-anchor="middle" font-size="16" fill="#1e293b">0 in release docs</text>
  <text x="790" y="262" text-anchor="middle" font-size="16" fill="#1e293b">Export</text>

  <text x="190" y="332" text-anchor="middle" font-size="16" fill="#1e293b">Compatibility</text>
  <text x="410" y="332" text-anchor="middle" font-size="16" fill="#1e293b">Open errors</text>
  <text x="610" y="332" text-anchor="middle" font-size="16" fill="#1e293b">0 high severity</text>
  <text x="790" y="332" text-anchor="middle" font-size="16" fill="#1e293b">QA</text>
</svg>
