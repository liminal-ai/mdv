appId: com.leemoore.mdviewer
productName: mdv
directories:
  output: dist/electron
mac:
  icon: assets/icon/mdv.icns
  category: public.app-category.productivity
  target:
    - target: dir
      arch:
        - arm64
        - x64
  identity: null
fileAssociations:
  - ext: md
    name: Markdown Document
    role: Viewer
    rank: Default
  - ext: markdown
    name: Markdown Document
    role: Viewer
    rank: Default
asar: true
asarUnpack:
  - dist/client/**/*
files:
  - dist/**/*
  - src/client/**/*.html
  - src/client/**/*.css
  - node_modules/**/*
  - "!node_modules/**/test/**"
  - "!node_modules/**/*.md"
extraMetadata:
  main: dist/electron/main.js
