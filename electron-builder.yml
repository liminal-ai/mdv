appId: com.leemoore.mdviewer
productName: mdv
directories:
  output: out/electron
mac:
  icon: assets/icon/mdv.icns
  category: public.app-category.productivity
  target:
    - target: dir
      arch:
        - arm64
        - x64
  identity: null
fileAssociations:
  - ext: md
    name: Markdown Document
    role: Viewer
    rank: Owner
  - ext: markdown
    name: Markdown Document
    role: Viewer
    rank: Owner
asar: true
asarUnpack:
  - dist/client/**/*
files:
  - package.json
  - dist/client/**/*
  - dist/server/**/*
  - dist/shared/**/*
  - dist/pkg/**/*
  - dist/electron/main.js
  - dist/electron/preload.cjs
  - node_modules/**/*
  - '!node_modules/**/test/**'
  - '!node_modules/**/*.md'
  - '!node_modules/**/*.map'
extraMetadata:
  main: dist/electron/main.js
