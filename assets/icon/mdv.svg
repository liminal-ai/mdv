<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2b3d"/>
      <stop offset="100%" stop-color="#1a1825"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#a07850"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bg)"/>
  <!-- Inner border -->
  <rect x="96" y="96" width="832" height="832" rx="148" ry="148" fill="none" stroke="#3d3a50" stroke-width="3"/>
  <!-- Markdown down-arrow (the M↓ symbol) -->
  <g transform="translate(512, 460)" fill="url(#accent)">
    <!-- M shape -->
    <path d="M-260,-160 L-260,160 L-200,160 L-200,-40 L-120,80 L-80,80 L0,-40 L0,160 L60,160 L60,-160 L0,-160 L-100,20 L-200,-160 Z"/>
    <!-- Down arrow -->
    <path d="M160,-120 L220,-120 L220,20 L300,20 L190,140 L80,20 L160,20 Z"/>
  </g>
  <!-- "mdv" text label -->
  <text x="512" y="720" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="140" font-weight="600" letter-spacing="8" fill="#8a8698">mdv</text>
</svg>
